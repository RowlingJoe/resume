# 项目经验

# 刑事技术一体化实战应用平台
- project: 刑事技术一体化实战应用平台
  role: 开发经理
  duration: 2021.5 &mdash; 2025.12
  description: |
    <p><strong>项目描述：</strong>此项目是帮助刑事警察进行案件录入侦破的一体化平台。使用uaop为整体外部框架，内部由多个子系统构成（现勘、技术管理、质量管理、大屏、sso、质量检查等）。通过终端快勘快速将现场案情录入系统，再在平台对数据进行收集、整理、分析。实现对案件数据的全流程保存，数据挖掘，串并案分析，通过现场打点、多平台联动、指纹比对、在线签章、vr现场回看等辅助民警工作，同时还支撑公安部对各级单位的季度、年度考核任务等其他平台业务；平台已覆盖全国31个省市地区且系统出口至澳门、阿尔及利亚、智利等海外国家地区。</p>
    <p><strong>项目职责：</strong></p>
    <ul class="resume-item-list">
      <li>开发业务中的公共服务组件</li>
      <li>与三方开发人员进行外部业务的调试</li>
      <li>使用H5开发终端部分业务，减少终端业务操作</li>
      <li>分发组内开发任务并review组内代码</li>
      <li>带领研发组完成多个子系统的开发（现勘、串并分析、质量检查等）</li>
    </ul>
    <p><strong>技术成果：</strong></p>
    <ul class="resume-item-list">
      <li>性能优化：通过路由懒加载、组件异步加载、图片压缩等手段，首屏加载时间从4秒降至1.8秒</li>
      <li>实时通信：基于websocket实现案件消息实时推送，支持5000+并发连接</li>
      <li>地图交互：使用WebGL技术将案发现场地理位置相关信息在地图上进行自定义显示、统计各区域案件数量，进行不同地图层级的交互</li>
      <li>可视化大屏：使用echarts + d3.js构建多维度数据看板，提供10+种分析图表</li>
      <li>使用fabric.js技术将指纹比对软件在线化，增加系统集成度</li>
    </ul>

