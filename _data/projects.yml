# 如e课堂平板APP
- project: 如e课堂平板APP
  role: Web前端
  duration: 2016.10 &mdash; 2018.02
  description: |
    <p><strong>项目描述：</strong>如e课堂APP是一款基于Cordova的混合式APP，能够将前端JS代码打包成APP在移动设备上运行，对于调取设备的API如拍照、录音、摄像等可使用Cordova相关插件进行操作。课堂上老师可以使用如e课堂与学生进行互动教学如抢答、拍照、出题等，记录学生的行为传给后端数据库进行后期数据分析；也可以播放老师的课件并进行相关操作。</p>
